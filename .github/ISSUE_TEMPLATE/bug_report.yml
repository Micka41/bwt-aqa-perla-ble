name: Bug report
description: Report a problem with the BWT AQA Perla BLE integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill in all fields to help diagnose the issue.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "e.g. 2024.12.0"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: "e.g. 2.0.0"
    validations:
      required: true

  - type: input
    id: firmware
    attributes:
      label: BWT firmware version
      description: Visible in the Firmware sensor
      placeholder: "e.g. A22X V1.23"
    validations:
      required: false

  - type: dropdown
    id: bluetooth_setup
    attributes:
      label: Bluetooth setup
      options:
        - USB Bluetooth adapter
        - ESPHome Bluetooth proxy
        - Both
    validations:
      required: true

  - type: input
    id: rssi
    attributes:
      label: BLE signal strength (RSSI)
      description: Visible in Settings → Integrations → Bluetooth
      placeholder: "e.g. -72 dBm"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Enable debug logging in configuration.yaml:
        ```yaml
        logger:
          logs:
            custom_components.bwt_aqa_perla_ble: debug
            bleak_retry_connector: debug
        ```
      render: text
    validations:
      required: false
